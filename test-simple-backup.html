<!DOCTYPE html>
<html>
<head>
    <title>Simple Backup Test</title>
</head>
<body>
    <h1>Simple Backup API Test</h1>
    <button onclick="testBackup()">Test Backup API</button>
    <div id="result"></div>
    
    <script>
        async function testBackup() {
            console.log('Testing backup API...');
            
            try {
                const response = await fetch('/api/test-simple-backup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        test: 'simple backup',
                        timestamp: new Date().toISOString()
                    })
                });
                
                const result = await response.json();
                console.log('Response:', result);
                
                document.getElementById('result').innerHTML = `
                    <h3>Test Result:</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Test error:', error);
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
